name: pr

on: 
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
           node-version: "20"
           cache: "npm"
      
      - name: Install dependencies
        run: make dev-dependencies
      
      - name: Run linter
        run: make lint
    
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    needs: 
      - lint

    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: "npm"
        
      - name: Install dependencies
        run: make dev-dependencies
      
      - name: Compile all TypeScript Files
        run: npm run build

      - name: Run tests
        run: make test-mocked

       